      border-color: var(--teal);
      color: white;
    }

      margin-bottom: 16px;
    }

      font-weight: 700;

      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .sermon-card:hover {

    .sermon-card-left { flex: 1; min-width: 0; }

      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .card-series {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
    }

      font-size: 1.18rem;
      font-weight: 700;

      line-height: 1.35;

      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .card-arrow {
      color: var(--teal);
      font-size: 1.3rem;
      flex-shrink: 0;
      opacity: 0.6;
    }

      align-items: center;

      border: none;

      padding: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);

      align-items: center;

      align-items: center;
      gap: 8px;
      background: none;
      border: 1.5px solid var(--teal);

    @media (max-width: 600px) {
      .hub-header h1 { font-size: 1.8rem; }
      .detail-title { font-size: 1.5rem; }
      .sermon-body { padding: 24px 18px; }
      .detail-hero { padding: 6px 18px 28px; }
    }
  </style>
</head>

      title: "Weep No More",
      scripture: "Revelation 5:1-14",
      book: "Revelation",
      series: "Easter 2026",
      date: "April 5, 2026",
      preacher: "Justin Stevers",
      simpleTruth: "Jesus is worthy. And that changes everything.",
      outline: [
        {
          label: "I.",
          title: "Do You Feel the Despair? (vv. 1-4)",
          body: "John, in a vision, stands in the throne room of heaven and watches an angel ask a question: who is worthy to open the scroll sealed with seven seals? This scroll contains God's entire plan for history: justice for the oppressed, judgment for the wicked, the renewal of all things. The angel looks through all of heaven, all of earth, all the places under the earth. No one is found worthy to open it. John weeps bitterly. And if you feel the weight of that moment, you should. Without someone worthy to open that scroll, the martyrs who died for their faith are never vindicated. The prayers of suffering people are never answered. Evil is never finally defeated. Jesus never returns. If no one opens that scroll, the universe is just a place where the powerful take what they want and die, and nothing means anything. That is not dramatic. That is just what hopelessness actually feels like."
        },
        {
          label: "II.",
          title: "Do You See the Deliverer? (vv. 5-7)",
          body: "One of the elders tells John to stop weeping. \"The Lion of the tribe of Judah, the Root of David, has conquered.\" John turns to see the Lion and sees a Lamb, standing as though it had been slaughtered, with the marks of death still on him. This is one of the most important images in the entire Bible. The conquering did not happen through force. It happened through sacrifice. Jesus did not defeat sin and death by overpowering them from the outside. He stepped into the worst of it, took the full weight of human failure on himself, died, and rose. That is how he conquered. And that conquest is why he alone is worthy to hold history in his hands. The resurrection of Jesus is not an add-on to Christianity. Take it away and there is nothing left. It is the hinge of everything."
        },
        {
          label: "III.",
          title: "Do You Join the Doxology? (vv. 8-14)",
          body: "When the Lamb takes the scroll, something breaks open in the throne room of heaven. The four living creatures and twenty-four elders fall down before the Lamb. Then thousands upon thousands of angels join in. Then every creature in heaven and on earth and under the earth and in the sea adds their voice: \"Worthy is the Lamb who was slain, to receive power and wealth and wisdom and might and honor and glory and blessing!\" That is the destiny of creation: a universe full of creatures who have finally seen Jesus clearly enough to have no other response than worship. The question Revelation 5 asks us is simple. You have heard who he is and what he did. Is your life oriented around him? Does the resurrection actually change anything for you day to day?"
        }
      ],
      takeaways: [
        "The apostle Paul said that if Jesus did not rise from the dead, our faith is worthless and we are still in our sins (1 Corinthians 15). Easter is not a tradition layered onto Christianity. It is the center of it.",
        "The Lion of Judah conquered as a Lamb. The greatest power in the universe chose sacrifice over force. That is not weakness. It is a completely different definition of strength.",
        "We do not need a bigger church, a better worship band, or a more effective program. We need a bigger view of Jesus. When we truly see him, everything else falls into its right place."
      ]
    }
  ];

  // ─────────────────────────────────────────────
  // BOOK ORDER (canonical)
  // ─────────────────────────────────────────────
  const BOOK_ORDER_LIST = [
    "Genesis","Exodus","Leviticus","Numbers","Deuteronomy",
    "Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings",
    "1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther",
    "Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon",
    "Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel",
    "Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum",
    "Habakkuk","Zephaniah","Haggai","Zechariah","Malachi",
    "Matthew","Mark","Luke","John","Acts",
    "Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians",
    "Philippians","Colossians","1 Thessalonians","2 Thessalonians",
    "1 Timothy","2 Timothy","Titus","Philemon",
    "Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude",
    "Revelation"
  ];

  // ─────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────
  let ALL_SERMONS = [...FALLBACK_SERMONS]; // will be updated after sheet fetch
  let activeFilter = "All";

  // ─────────────────────────────────────────────
  // FETCH FROM GOOGLE SHEET
  // ─────────────────────────────────────────────
  async function loadSheetSermons() {
    try {
      const res = await fetch(SCRIPT_URL, { redirect: 'follow' });
      const rows = await res.json();
      if (!Array.isArray(rows) || rows.length === 0) return;

      rows.forEach(row => {
        const ytId = (row['YouTube ID'] || '').trim();
        if (!ytId) return;

        // Check if we already have this sermon in fallback data
        const existing = ALL_SERMONS.find(s => s.youtubeId === ytId);
        if (existing) {
          // Update the preacher from sheet in case it changed
          if (row['Preacher']) existing.preacher = row['Preacher'];
          return;
        }

        // New sermon from sheet — add it
        ALL_SERMONS.push({
          youtubeId: ytId,
          title: row['Title'] || '',
          scripture: row['Scripture'] || '',
          book: extractBook(row['Scripture'] || ''),
          series: row['Series'] || '',
          date: row['Date'] || '',
          preacher: row['Preacher'] || 'Justin Stevers',
          simpleTruth: row['Description'] || '',
          docUrl: row['Doc URL'] || '',
          outline: [],    // no inline outline for sheet-only sermons
          takeaways: [],
        });
      });

      // Sort by date descending (newest first within each book)
      ALL_SERMONS.sort((a, b) => {
        const da = new Date(a.date), db = new Date(b.date);
        return db - da;
      });

      renderHub();
    } catch (err) {
      // Silent fail — fallback data still shows
      console.log('Sheet fetch skipped:', err.message);
    }
  }

  function extractBook(scripture) {
    if (!scripture) return 'Other';
    for (const book of BOOK_ORDER_LIST) {
      if (scripture.startsWith(book)) return book;
    }
    // Fallback: everything before the first digit
    return scripture.replace(/\s*\d.*$/, '').trim() || 'Other';
  }

  // ─────────────────────────────────────────────
  // RENDER HUB
  // ─────────────────────────────────────────────
  function getBooks() {
    const books = [...new Set(ALL_SERMONS.map(s => s.book))];
    books.sort((a, b) => BOOK_ORDER_LIST.indexOf(a) - BOOK_ORDER_LIST.indexOf(b));
    return books;
  }

  function renderHub() {
    const filterRow = document.getElementById('filter-row');
    const books = getBooks();
    const filters = ["All", ...books];
    filterRow.innerHTML = filters.map(f =>
      `<button class="filter-btn ${f === activeFilter ? 'active' : ''}" onclick="setFilter('${f}')">${f}</button>`
    ).join('');

    const list = document.getElementById('sermon-list');
    const visibleBooks = activeFilter === "All" ? books : [activeFilter];

    list.innerHTML = visibleBooks.map(book => {
      const bookSermons = ALL_SERMONS.filter(s => s.book === book);
      if (bookSermons.length === 0) return '';
      return `
        <div class="book-section">
          <div class="book-heading">
            <div class="book-name">${book}</div>
            <div class="book-line"></div>
          </div>
          ${bookSermons.map(s => `
            <div class="sermon-card" onclick="showDetail('${s.youtubeId}')">
              <div class="sermon-card-left">
                <div class="card-meta">
                  <span class="card-series">${s.series}</span>
                  <span class="card-dot"></span>
                  <span class="card-date">${s.date}</span>
                </div>
                <div class="card-title">${s.title}</div>
                <div class="card-scripture">${s.scripture}${s.preacher ? ' &nbsp;·&nbsp; ' + s.preacher : ''}</div>
              </div>
              <div class="card-arrow">&#8250;</div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  function setFilter(book) {
    activeFilter = book;
    renderHub();
  }

  // ─────────────────────────────────────────────
  // DETAIL VIEW
  // ─────────────────────────────────────────────
  function showDetail(youtubeId) {
    const s = ALL_SERMONS.find(x => x.youtubeId === youtubeId);
    if (!s) return;

    document.getElementById('d-series').textContent = s.series;
    document.getElementById('d-title').textContent = s.title;
    document.getElementById('d-ref').textContent = s.scripture + '  ·  ' + s.date;
    document.getElementById('d-preacher').textContent = s.preacher ? 'Preacher: ' + s.preacher : '';
    document.getElementById('d-video').src = `https://www.youtube.com/embed/${s.youtubeId}`;
    document.getElementById('d-main-point').textContent = s.simpleTruth;

    const hasOutline = s.outline && s.outline.length > 0;
    const hasTakeaways = s.takeaways && s.takeaways.length > 0;
    const hasDocUrl = s.docUrl && s.docUrl.length > 0;

    // Outline section
    document.getElementById('d-outline-section').style.display = hasOutline ? 'block' : 'none';
    if (hasOutline) {
      document.getElementById('d-outline').innerHTML = s.outline.map(p => `
        <li class="outline-item">
          <div class="outline-point-num">${p.label}</div>
          <div class="outline-point-title">${p.title}</div>
          <div class="outline-point-body">${p.body}</div>
        </li>
      `).join('');
    }

    // Notes link (for sheet-only sermons)
    const notesSection = document.getElementById('d-notes-link-section');
    if (!hasOutline && hasDocUrl) {
      document.getElementById('d-notes-link').href = s.docUrl;
      notesSection.style.display = 'flex';
    } else {
      notesSection.style.display = 'none';
    }

    // Takeaways
    document.getElementById('d-takeaways-section').style.display = hasTakeaways ? 'block' : 'none';
    if (hasTakeaways) {
      const checkIcon = `<svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      document.getElementById('d-takeaways').innerHTML = s.takeaways.map(t => `
        <li>
          <div class="takeaway-bullet">${checkIcon}</div>
          <span>${t}</span>
        </li>
      `).join('');
    }

    document.getElementById('hub-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function showHub() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('hub-view').style.display = 'block';
    document.getElementById('d-video').src = '';
    window.scrollTo(0, 0);
  }

  // ─────────────────────────────────────────────
  // INIT: render immediately from fallback data,
  // then silently update if the sheet has more.
  // ─────────────────────────────────────────────
  renderHub();
  loadSheetSermons();
</script>
</body>
</html>
